name: OpenCode Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: opencode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            Review this pull request as a senior maintainer for obsidian-getnote-importer.

            Prioritize actionable findings:
            - Bugs, regressions, data loss, broken Obsidian vault writes, unsafe API parsing, or sync correctness issues.
            - Missing tests for changed sync, parser, settings, modal, or i18n behavior.
            - CI/release breakage or missing release assets.

            Keep the review concise. Do not request broad refactors unless they block correctness.
            If the PR is generated by an AI agent, be especially strict about tests, minimal scope, and version bumps.
