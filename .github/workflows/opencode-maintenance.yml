name: OpenCode Maintenance

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      prompt:
        description: Maintenance task for OpenCode
        required: false
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-maintenance
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            ${{ inputs.prompt || 'Perform weekly maintenance for obsidian-getnote-importer. Review open TODOs, failing or flaky tests, dependency drift, release packaging, and issues that have clear next actions. Open issues for worthwhile work. Open a pull request only for small, low-risk fixes that include tests and pass npm run typecheck, npm run lint, npm test, and npm run build. Do not change package or manifest versions unless explicitly requested.' }}
