name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Skip Codex when OpenAI API key is not configured
        if: env.OPENAI_API_KEY == ''
        run: echo "OPENAI_API_KEY is not configured; skipping Codex review."

      - uses: actions/checkout@v5
        if: env.OPENAI_API_KEY != ''
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Fetch PR refs
        if: env.OPENAI_API_KEY != ''
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        if: env.OPENAI_API_KEY != ''
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            This repository is a TypeScript Obsidian plugin that syncs GetNote notes into a local Obsidian vault.

            Review only the changes introduced by this pull request:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Prioritize actionable findings:
            - Bugs, regressions, data loss, broken Obsidian vault writes, unsafe API parsing, or sync correctness issues.
            - Missing tests for changed sync, parser, settings, modal, or i18n behavior.
            - CI/release breakage or missing release assets.

            Keep the review concise. Do not request broad refactors unless they block correctness.
            Mention if no blocking issues were found.

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
