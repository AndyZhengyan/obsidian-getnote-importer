name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: Task for OpenCode
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        (
          github.event_name == 'issue_comment' ||
          github.event_name == 'pull_request_review_comment'
        ) &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        ) &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          contains(github.event.review.body || '', '/oc') ||
          contains(github.event.review.body || '', '/opencode') ||
          (
            contains(toJson(github.event.pull_request.labels.*.name), 'ai-autofix') &&
            (
              github.event.review.state == 'changes_requested' ||
              github.event.review.state == 'commented'
            )
          )
        ) &&
        (
          github.event.review.author_association == 'OWNER' ||
          github.event.review.author_association == 'MEMBER' ||
          github.event.review.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            You are maintaining obsidian-getnote-importer, a TypeScript Obsidian plugin that syncs GetNote notes into a local Obsidian vault.

            Requested task or review context:
            ${{ inputs.prompt || github.event.comment.body || github.event.review.body || 'Address the latest pull request review feedback for this repository.' }}

            Follow the repository instructions in AGENTS.md and .github/copilot-instructions.md.
            Keep changes small and focused. Before proposing or committing code, run:
            - npm run typecheck
            - npm run lint
            - npm test
            - npm run build

            For issue comments, either answer with a concrete triage result or create a branch and pull request when the requested fix is clear.
            For pull request comments or review comments, update the pull request branch when the requested change is valid.
            Never change package or manifest versions unless the task explicitly asks for a release.
