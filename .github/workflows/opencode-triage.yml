name: OpenCode Issue Triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: |
      !contains(github.event.issue.title, '[skip ai]') &&
      !contains(github.event.issue.body || '', '[skip ai]')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check account age
        id: account
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login,
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created.getTime()) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - uses: actions/checkout@v4
        if: steps.account.outputs.result == 'true'
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        if: steps.account.outputs.result == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            Triage this issue for obsidian-getnote-importer.

            If the issue is incomplete, ask for the smallest missing reproduction details.
            If it is a valid bug or small enhancement with a clear fix, create a focused branch and pull request.
            If it looks like support usage, answer with concise setup or debugging guidance.
            Prefer adding tests before changing production code.
            Never modify version numbers during issue triage.
